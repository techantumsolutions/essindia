version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: essind_web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env.production
    networks:
      - essind_network

  redis:
    image: redis:7-alpine
    container_name: essind_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-supersecretredispassword}
    volumes:
      - redis_data:/data
    networks:
      - essind_network

  nginx:
    image: nginx:alpine
    container_name: essind_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment below line and add certificates for HTTPS
      # - ./certs:/etc/ssl/certs:ro
    depends_on:
      - web
    networks:
      - essind_network

volumes:
  redis_data:

networks:
  essind_network:
    driver: bridge
